<!DOCTYPE html>
<html lang="id">
<head>
    <meta property="og:title" content="A.O.N.T. Gacha Terminal">
    <meta property="og:description" content="Strategic analysis tool for Proxy & Sensei. Check your pity and daily targets.">
    <meta property="og:image" content="https://raw.githubusercontent.com/username/repo/main/image-preview.png">
    <meta name="theme-color" content="#00aeef">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A.O.N.T. | Mobile Terminal v3.2</title>
    <style>
        :root {
            --primary: #00aeef; --light: #e6f7ff; --accent: #ff5a5f;
            --dark: #121212; --bg: #f0f2f5; --text-on-dark: #fff;
            --input-bg: #222; --panel-bg: #fff; --panel-text: #333;
        }

        [data-theme="zzz"] {
            --primary: #f8d347; --light: #2a2a2a; --accent: #ff5a5f;
            --dark: #000; --bg: #121212; --text-on-dark: #f8d347;
            --input-bg: #1a1a1a; --panel-bg: #1a1a1a; --panel-text: #f0f0f0;
        }

        [data-theme="genshin"] {
            --primary: #e3cc9c; --light: #fffcf5; --accent: #ff5a5f;
            --dark: #3b3b3b; --bg: #f5f1e8; --text-on-dark: #e3cc9c;
            --input-bg: #4a4a4a; --panel-bg: #fff; --panel-text: #3b3b3b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); color: var(--panel-text); overflow-x: hidden; }

        /* --- HERO SECTION (RESPONSIVE) --- */
        .hero {
            background-color: var(--primary); color: var(--dark);
            padding: 50px 15px; text-align: center;
            border-bottom: 6px solid var(--dark); position: relative; overflow: hidden;
        }

        .hero h1 { 
            font-family: 'Courier New', monospace; font-size: clamp(1.5rem, 8vw, 2.5rem); 
            position: relative; z-index: 2; text-transform: uppercase;
            animation: glitch 3s infinite;
        }

        .hero::before {
            content: "PROXY_CONNECTED // SCHALE_ACTIVE // INTER-KNOT_LINK // ";
            position: absolute; font-family: monospace; font-size: 5rem;
            font-weight: bold; color: var(--dark); opacity: 0.1;
            white-space: nowrap; bottom: -10px; left: 0; z-index: 1;
            animation: scrollText 20s linear infinite;
        }

        @keyframes scrollText { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        .theme-switcher {
            position: absolute; top: 10px; right: 10px; z-index: 10;
            display: flex; gap: 8px;
        }
        .theme-btn { width: 25px; height: 25px; border: 2px solid var(--dark); border-radius: 4px; cursor: pointer; }

        /* --- CONTAINER (UTAMA) --- */
        .container {
            max-width: 1100px; 
            margin: -20px auto 40px;
            display: flex; 
            flex-direction: column; /* Default untuk HP: Atas-Bawah */
            gap: 20px; padding: 0 15px; position: relative; z-index: 3;
        }

        /* --- SIDEBAR & CONTENT --- */
        .sidebar, .content {
            width: 100%; /* Default lebar penuh di HP */
            border: 2px solid var(--dark);
            box-shadow: 6px 6px 0px var(--dark);
        }

        .sidebar {
            background: var(--dark); color: var(--text-on-dark);
            padding: 20px; box-shadow: 6px 6px 0px var(--primary);
        }

        .content { background: var(--panel-bg); padding: 20px; }

        /* --- FORM ELEMENTS --- */
        .label-tech { font-size: 0.6rem; color: #888; text-transform: uppercase; margin-bottom: 4px; display: block; }
        input[type="number"] {
            width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid #444;
            color: var(--primary); font-weight: bold; margin-bottom: 12px; outline: none; font-size: 16px; /* 16px cegah auto-zoom di iOS */
        }

        .switch-group { 
            display: flex; align-items: center; justify-content: space-between; 
            margin-bottom: 15px; background: rgba(255,255,255,0.05); padding: 10px; 
        }

        .btn-execute {
            width: 100%; padding: 16px; border: none; font-weight: bold;
            text-transform: uppercase; background: var(--accent); color: white; cursor: pointer;
        }

        /* --- STATS GRID --- */
        .grid-stats { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .card-stat { background: var(--light); border: 1px solid var(--primary); padding: 15px; position: relative; }
        .val { font-size: 1.8rem; font-weight: bold; color: var(--dark); }

        .alert-box { margin-top: 15px; padding: 15px; border: 2px dashed #ccc; font-weight: bold; text-align: center; font-size: 0.9rem; }
        .ready { background: #e8f5e9; color: #2e7d32; border-color: #2e7d32; }
        .warning { background: #ffebee; color: #c62828; border-color: #c62828; }

        .daily-report {
            margin-top: 15px; padding: 12px; background: var(--dark); color: var(--primary);
            font-family: monospace; font-size: 0.8rem; border: 1px solid var(--primary);
        }

        /* --- DESKTOP VIEW (MINIMAL LEBAR LAYAR 800PX) --- */
        @media (min-width: 800px) {
            .container { flex-direction: row; align-items: flex-start; }
            .sidebar { width: 350px; flex-shrink: 0; }
            .content { flex-grow: 1; }
            .grid-stats { grid-template-columns: repeat(2, 1fr); }
            .hero { padding: 80px 15px; }
        }

        /* Switch UI */
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #555; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body>

    <div class="hero">
        <div class="theme-switcher">
            <div class="theme-btn" style="background:#00aeef" onclick="setTheme('ba')"></div>
            <div class="theme-btn" style="background:#f8d347" onclick="setTheme('zzz')"></div>
            <div class="theme-btn" style="background:#e3cc9c" onclick="setTheme('genshin')"></div>
        </div>
        <h1>// A.O.N.T._v3.2</h1>
        <p style="font-size: 0.7rem; opacity: 0.8;">MOBILE_OPTIMIZED_TERMINAL</p>
    </div>

    <div class="container">
        <div class="sidebar">
            <span class="label-tech">Inventory: Gems/Jade</span>
            <input type="number" id="inJade" placeholder="0" oninput="kalkulasi()">

            <span class="label-tech">Inventory: Tickets</span>
            <input type="number" id="inTiket" placeholder="0" oninput="kalkulasi()">

            <span class="label-tech">Current Pity (Already Done)</span>
            <input type="number" id="inCurrentPity" placeholder="0" oninput="kalkulasi()">

            <span class="label-tech">Target (80/90/180)</span>
            <input type="number" id="inTarget" value="90" oninput="kalkulasi()">

            <span class="label-tech">Days Remaining</span>
            <input type="number" id="inDays" value="20" oninput="kalkulasi()">

            <div class="switch-group">
                <span class="label-tech" style="color:var(--primary); margin:0;">GUARANTEE?</span>
                <label class="switch">
                    <input type="checkbox" id="inGuarantee" onchange="kalkulasi()">
                    <span class="slider"></span>
                </label>
            </div>

            <button class="btn btn-execute" onclick="kalkulasi()">REFRESH DIAGNOSTIC</button>
        </div>

        <div class="content">
            <div class="grid-stats">
                <div class="card-stat">
                    <span class="label-tech">Pulls Saved</span>
                    <div class="val"><span id="outPull">0</span><span class="unit">x</span></div>
                </div>
                <div class="card-stat">
                    <span class="label-tech">Net Assets (Gems)</span>
                    <div class="val"><span id="outNet">0</span></div>
                </div>
            </div>

            <div id="statusPity" class="alert-box">READY_FOR_INPUT</div>

            <div id="dailyReport" class="daily-report" style="display: none;">
                [DAILY_MISSION]<br>
                Target: <strong><span id="outDailyJade">0</span> 💎/day</strong><br>
                To reach goal in <span id="outDays">0</span> days.
            </div>
        </div>
    </div>

    <script>
        function setTheme(t) { 
            document.documentElement.setAttribute('data-theme', t); 
            localStorage.setItem('theme', t); 
        }
        setTheme(localStorage.getItem('theme') || 'ba');

        function kalkulasi() {
            const jade = parseInt(document.getElementById('inJade').value) || 0;
            const tiket = parseInt(document.getElementById('inTiket').value) || 0;
            const currentPity = parseInt(document.getElementById('inCurrentPity').value) || 0;
            const sisaHari = parseInt(document.getElementById('inDays').value) || 1;
            const isGuarantee = document.getElementById('inGuarantee').checked;
            let target = parseInt(document.getElementById('inTarget').value) || 90;
            if (!isGuarantee) target *= 2;

            const totalPullSavings = Math.floor(jade / 160) + tiket;
            const totalAkumulasi = currentPity + totalPullSavings;
            const totalNetJade = jade + (tiket * 160);

            document.getElementById('outPull').innerText = totalPullSavings;
            document.getElementById('outNet').innerText = totalNetJade.toLocaleString('id-ID');

            const box = document.getElementById('statusPity');
            const daily = document.getElementById('dailyReport');

            if (totalAkumulasi >= target) {
                box.className = "alert-box ready";
                box.innerHTML = `[TARGET_SECURED]<br>Total: ${totalAkumulasi} Pulls Available`;
                daily.style.display = "none";
            } else {
                const kurangPull = target - totalAkumulasi;
                const dailyJade = Math.ceil((kurangPull * 160) / sisaHari);
                box.className = "alert-box warning";
                box.innerHTML = `[INSUFFICIENT_FUNDS]<br>Need ${kurangPull} more pulls`;
                document.getElementById('outDays').innerText = sisaHari;
                document.getElementById('outDailyJade').innerText = dailyJade.toLocaleString('id-ID');
                daily.style.display = "block";
            }
        }
        // Jalankan sekali saat load
        kalkulasi();
    </script>
</body>
</html>
